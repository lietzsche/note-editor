name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare local env vars for workers tests
        run: printf 'AUTH_SESSION_SECRET=%s\n' "$AUTH_SESSION_SECRET" > .dev.vars
        env:
          AUTH_SESSION_SECRET: ci-test-session-secret-32-characters-minimum

      - name: Run verification gate
        run: npm run verify
