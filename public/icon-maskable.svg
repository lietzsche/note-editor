<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background (fills entire canvas for maskable) -->
  <rect width="512" height="512" fill="#1f6feb"/>
  <!-- Paper (within safe zone: ~102px inset from each edge) -->
  <rect x="148" y="108" width="216" height="280" rx="16" fill="#ffffff"/>
  <!-- Text lines -->
  <rect x="180" y="164" width="152" height="12" rx="6" fill="#1f6feb" opacity="0.25"/>
  <rect x="180" y="194" width="152" height="12" rx="6" fill="#1f6feb" opacity="0.25"/>
  <rect x="180" y="224" width="116" height="12" rx="6" fill="#1f6feb" opacity="0.25"/>
  <rect x="180" y="254" width="136" height="12" rx="6" fill="#1f6feb" opacity="0.25"/>
  <!-- Pencil -->
  <g transform="translate(288, 306) rotate(-45)">
    <rect x="-11" y="-44" width="22" height="76" rx="3" fill="#1f6feb"/>
    <polygon points="-11,32 11,32 0,54" fill="#111111" opacity="0.6"/>
    <rect x="-11" y="-56" width="22" height="14" rx="3" fill="#ffffff" opacity="0.7"/>
  </g>
</svg>
